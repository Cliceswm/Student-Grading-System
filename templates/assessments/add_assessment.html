{% extends "base.html" %}
{% block content %}

<h1>Add New Assessment for {{ course.name }}</h1>

{% if error %}
<p class="msg-error">{{ error }}</p>
{% endif %}

{% if success %}
<p class="msg-success">{{ success }}</p>
{% endif %}

<form method="POST">

    <label>Title:</label><br>
    <input type="text" name="title" required><br><br>

    <label>Description (optional):</label><br>
    <textarea name="description" rows="4" cols="50"></textarea><br><br>

    <label>Weight (%):</label><br>
    <input type="text" name="weight" required><br><br>

    <label>Due date (optional):</label><br>
    <input type="date" name="due_date"><br><br>

    <button type="submit">Create</button>
</form>

<br>
<a href="/courses/{{ course.id }}/assessments">← Back to assessments</a>

{% endblock %}
